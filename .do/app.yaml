name: architgrid
region: sgp

databases:
  - name: architgrid-db
    engine: MYSQL
    version: "8"
    production: false
    cluster_name: architgrid-cluster

services:
  - name: web
    github:
      repo: vtion001/architect-ai
      branch: main
      deploy_on_push: true

    # Use Heroku PHP buildpack (auto-detected via Procfile)
    buildpack:
      builder: heroku/buildpacks:20

    run_command: heroku-php-apache2 public/

    instance_count: 1
    instance_size_slug: basic-xxs

    http_port: 8080

    envs:
      - key: APP_NAME
        value: "ArchitGrid"
      - key: APP_ENV
        value: "production"
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: APP_URL
        value: "${APP_URL}"

      - key: LOG_CHANNEL
        value: "stack"
      - key: LOG_LEVEL
        value: "error"

      - key: SESSION_DRIVER
        value: "database"
      - key: CACHE_DRIVER
        value: "database"
      - key: QUEUE_CONNECTION
        value: "database"

      - key: DB_CONNECTION
        value: "mysql"
      - key: DB_HOST
        value: "${architgrid-db.HOSTNAME}"
      - key: DB_PORT
        value: "${architgrid-db.PORT}"
      - key: DB_DATABASE
        value: "${architgrid-db.DATABASE}"
      - key: DB_USERNAME
        value: "${architgrid-db.USERNAME}"
      - key: DB_PASSWORD
        value: "${architgrid-db.PASSWORD}"
        type: SECRET
