name: architgrid
region: sgp

databases:
  - name: architgrid-db
    engine: MYSQL
    version: "8"
    production: true
    cluster_name: architgrid-cluster

services:
  - name: web
    github:
      repo: vtion001/architect-ai
      branch: main
      deploy_on_push: true
    
    build_command: |
      composer install --no-dev --optimize-autoloader
      npm ci
      npm run build
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    
    run_command: |
      php artisan migrate --force
      heroku-php-apache2 public/
    
    environment_slug: php
    instance_count: 1
    instance_size_slug: basic-xxs
    
    http_port: 8080
    
    envs:
      - key: APP_NAME
        value: "ArchitGrid"
      - key: APP_ENV
        value: "production"
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: APP_URL
        value: "${APP_URL}"
      
      - key: LOG_CHANNEL
        value: "stack"
      - key: LOG_LEVEL
        value: "error"
      
      - key: SESSION_DRIVER
        value: "database"
      - key: CACHE_DRIVER
        value: "database"
      - key: QUEUE_CONNECTION
        value: "database"
      
      - key: DB_CONNECTION
        value: "mysql"
      - key: DB_HOST
        value: "${architgrid-db.HOSTNAME}"
      - key: DB_PORT
        value: "${architgrid-db.PORT}"
      - key: DB_DATABASE
        value: "${architgrid-db.DATABASE}"
      - key: DB_USERNAME
        value: "${architgrid-db.USERNAME}"
      - key: DB_PASSWORD
        value: "${architgrid-db.PASSWORD}"
        type: SECRET

workers:
  - name: queue-worker
    github:
      repo: vtion001/architect-ai
      branch: main
    
    build_command: |
      composer install --no-dev --optimize-autoloader
    
    run_command: php artisan queue:work --tries=3 --timeout=90
    
    environment_slug: php
    instance_count: 1
    instance_size_slug: basic-xxs
    
    envs:
      - key: APP_ENV
        value: "production"

jobs:
  - name: scheduler
    kind: PRE_DEPLOY
    github:
      repo: vtion001/architect-ai
      branch: main
    
    run_command: php artisan schedule:run
    
    environment_slug: php
