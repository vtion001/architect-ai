services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: architect-ai-app
        container_name: architect-ai-app
        restart: unless-stopped
        working_dir: /var/www
        environment:
            PHP_UPLOAD_MAX_FILESIZE: 100M
            PHP_POST_MAX_SIZE: 100M
            PHP_MEMORY_LIMIT: 256M
        volumes:
            - ./:/var/www
            - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
        networks:
            - architect-network

    web:
        image: nginx:alpine
        container_name: architect-ai-web
        restart: unless-stopped
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
        networks:
            - architect-network

    db:
        image: mysql:8.0
        container_name: architect-ai-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            MYSQL_PASSWORD: ${DB_PASSWORD}
            MYSQL_USER: ${DB_USERNAME}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
        networks:
            - architect-network

networks:
    architect-network:
        driver: bridge
