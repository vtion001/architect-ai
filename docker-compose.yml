services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: architect-ai-app
        container_name: architect-ai-app
        restart: unless-stopped
        working_dir: /var/www/html
        environment:
            PHP_MEMORY_LIMIT: 256M
            APP_URL: http://localhost:8081
            NGINX_WEBROOT: /var/www/html/public
            NGINX_PORT: 8080
            NGINX_CLIENT_MAX_BODY_SIZE: 100M
            HEALTHCHECK_PATH: /healthcheck
            PHP_PM: dynamic
            PHP_PM_MAX_CHILDREN: 8
            PHP_PM_START_SERVERS: 2
            PHP_PM_MIN_SPARE_SERVERS: 2
            PHP_PM_MAX_SPARE_SERVERS: 4
            PHP_OPCACHE_ENABLE: 0
            SKIP_LAZY_OVERRIDE: "true"
        env_file:
            - .env.docker
        volumes:
            - ./:/var/www/html
            - ./docker/php/php-fpm-pool.conf:/usr/local/etc/php-fpm.d/zzz-override.conf:ro
            - architect-storage:/var/www/html/storage
        networks:
            - architect-network

    queue:
        build:
            context: .
            dockerfile: Dockerfile
        image: architect-ai-app
        container_name: architect-ai-queue
        restart: unless-stopped
        working_dir: /var/www/html
        command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=600"]
        environment:
            PHP_MEMORY_LIMIT: 512M
            SKIP_LAZY_OVERRIDE: "true"
        env_file:
            - .env.docker
        volumes:
            - ./:/var/www/html
            - ./docker/php/php-fpm-pool.conf:/usr/local/etc/php-fpm.d/zzz-override.conf:ro
            - architect-storage:/var/www/html/storage
        networks:
            - architect-network
        depends_on:
            - app
            - db
            - qdrant

    web:
        image: nginx:alpine
        container_name: architect-ai-web
        restart: unless-stopped
        ports:
            - "8081:80"
        volumes:
            - ./:/var/www/html:ro
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/:ro
            - architect-storage:/var/www/html/storage:ro
        networks:
            - architect-network
        depends_on:
            - app

    db:
        image: mysql:8.0
        container_name: architect-ai-db
        restart: unless-stopped
        command: --default-authentication-plugin=mysql_native_password
        ports:
            - "3306:3306"
        environment:
            MYSQL_ROOT_PASSWORD: archpass123
            MYSQL_DATABASE: architect_ai
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
        networks:
            - architect-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-parchpass123"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    qdrant:
        image: qdrant/qdrant:latest
        container_name: architect-ai-qdrant
        restart: unless-stopped
        ports:
            - "6333:6333"
        volumes:
            - ./docker/qdrant/data:/qdrant/storage
        networks:
            - architect-network

networks:
    architect-network:
        driver: bridge

volumes:
    architect-storage:
