server {
    listen 80;
    index index.php index.html;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/public;

    client_max_body_size 100M;
    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    proxy_read_timeout 300;

    # ── Vite Dev Server Proxy ──────────────────────────────────────────────────
    # Vite runs on port 5173 inside the container, started by Supervisord.
    # Nginx proxies all Vite asset requests to it. This allows the browser to
    # connect to Nginx (port 80) and transparently get Vite-served HMR assets.
    location ~* ^/(@vite|/@id\/@vite|/@vite\/env|\.hot-update\.) {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;

        # HMR WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Vite takes a moment to start — don't 502 while it's booting
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # In dev: proxy to Vite for HMR-capable CSS/JS
        # In prod: these are served as /build/* static files by Vite build
        try_files $uri @vite_proxy;
    }

    location @vite_proxy {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── HTML caching ──────────────────────────────────────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── PHP processing ────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_cache_bypass $http_upgrade;
        fastcgi_cache_valid 200 60m;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── Everything else → Laravel ─────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
